<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Платеж</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #ff00ff 0%, #a020f0 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            color: white;
            overflow: hidden;
            box-sizing: border-box;
            padding: 60px 20px;
        }

        .sum-box {
            font-size: 32px;
            font-weight: 800;
            border-bottom: 3px solid white;
            padding-bottom: 5px;
            text-align: center;
        }

        .content-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        #auth-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: opacity 0.3s ease;
        }

        input {
            width: 85%;
            max-width: 320px;
            padding: 18px;
            border-radius: 50px;
            border: none;
            background: white;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            outline: none;
            color: black;
        }

        button {
            width: 70%;
            max-width: 250px;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s;
        }

        button:hover { background: #339cff; }
        button:active { transform: scale(0.98); }

        @keyframes fastShow {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        #success-msg {
            display: none;
            color: #00ff00;
            font-size: 34px;
            font-weight: 900;
            text-align: center;
            line-height: 1.2;
            animation: fastShow 0.4s ease-out;
        }

        /* Контейнер QR-кода */
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-white-bg {
            background: white;
            padding: 12px;
            border-radius: 18px; /* Скругление как на фото */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qr-image {
            width: 150px;
            height: 150px;
            display: block;
        }

        .qr-label {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 800;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="sum-box" id="sum-display">Итого: Сумма</div>

    <div class="content-area">
        <div id="auth-form">
            <input type="password" id="pass-input" placeholder="поле для пароля">
            <button onclick="verify()">Подтвердить</button>
        </div>

        <div id="success-msg">Покупка прошла<br>на ура! Спасибо!</div>
    </div>

        <div class="qr-label">QR Для оплаты!</div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const amount = params.get('sum');
    if (amount) {
        document.getElementById('sum-display').innerText = "Итого: " + amount + " ₽";
    }

    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
    }

    function verify() {
        const pin = document.getElementById('pass-input').value;
        if (pin === '9595') {
            const form = document.getElementById('auth-form');
            const success = document.getElementById('success-msg');

            form.style.opacity = '0';
            
            setTimeout(() => {
                form.style.display = 'none';
                success.style.display = 'block';
                if (tg) tg.HapticFeedback.notificationOccurred('success');
            }, 300);
        } else {
            alert('Неверный пароль!');
            document.getElementById('pass-input').value = '';
        }
    }
</script>

</body>
</html>
