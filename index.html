<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Платеж</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Градиент как на скриншоте */
            background: linear-gradient(180deg, #ff00ff 0%, #a020f0 50%, #8a2be2 100%);
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Распределяем элементы по высоте */
            color: white;
            overflow: hidden;
        }

        .top-section {
            margin-top: 80px;
            text-align: center;
        }

        .sum-box {
            font-size: 36px;
            font-weight: 900;
            color: #00ff00; /* Ярко-зеленый неоновый цвет */
            text-decoration: underline;
            text-transform: uppercase;
        }

        .middle-section {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        /* Поле ввода в стиле капсулы */
        input {
            width: 80%;
            max-width: 320px;
            padding: 18px 25px;
            border-radius: 50px;
            border: none;
            background: white;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        input::placeholder {
            color: #000;
        }

        .bottom-section {
            margin-bottom: 40px;
            text-align: center;
        }

        /* Стилизация QR-кода */
        .qr-container {
            background: white;
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .qr-container img {
            display: block;
            width: 150px;
            height: 150px;
        }

        .qr-label {
            font-size: 12px;
            font-weight: bold;
            color: #000;
            text-transform: uppercase;
        }

        #success-msg {
            display: none;
            background: rgba(0, 255, 0, 0.9);
            padding: 20px;
            border-radius: 20px;
            color: black;
            font-weight: bold;
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>

    <div class="top-section">
        <div class="sum-box" id="sum-display">ИТОГО: ЗАГРУЗКА...</div>
    </div>

    <div class="middle-section" id="auth-form">
        <input type="password" id="pass-input" placeholder="поле для пароля" oninput="checkPass()">
    </div>

    <div id="success-msg">ОПЛАТА ПОДТВЕРЖДЕНА!</div>

    <div class="bottom-section">
        <div class="qr-container">
            <!-- Замените ссылку на ваш реальный QR-код -->
            <img src="https://qrserver.com" alt="QR">
        </div>
        <div class="qr-label">QR Для оплаты!</div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const amount = params.get('sum');
    const display = document.getElementById('sum-display');

    if (amount) {
        display.innerText = "ИТОГО: " + amount + " ₽";
    } else {
        display.innerText = "ИТОГО: СУММА";
    }

    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#ff00ff'); // Цвет шапки в тон фона
    }

    // Автоматическая проверка при вводе
    function checkPass() {
        const pin = document.getElementById('pass-input').value;
        if (pin === '9595') {
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
            
            if (tg) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            setTimeout(() => {
                if (tg) tg.close();
            }, 3000);
        }
    }
</script>

</body>
</html>
